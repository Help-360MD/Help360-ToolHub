<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Help360MD Tools Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script>
    // Immediate Redirect Logic if already logged in
    if (sessionStorage.getItem('help360_user')) {
      window.location.replace('dashboard.html');
    }
  </script>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-header">
      <img src="logo.png" alt="Help360MD Logo" class="login-logo" onerror="this.src='https://placehold.co/200x80/0F4C81/FFFFFF?text=Help360MD+Logo'">
      <h1>Tools Hub</h1>
      <p>Sign in to access your internal work portal</p>
    </div>

    <form id="loginForm" class="login-form" onsubmit="handleLoginSubmit(event)">
      <!-- Alert Container -->
      <div id="errorAlert" class="alert alert-danger" style="display: none;">
        <i class="fas fa-triangle-exclamation"></i>
        <span id="errorMessage">Invalid credentials</span>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">
        <span>Sign In</span>
        <i class="fas fa-arrow-right"></i>
      </button>
    </form>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <span class="spinner-text">Authenticating...</span>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
